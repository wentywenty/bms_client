bms_bridge:
  ros__parameters:
    # --- Communication Config ---
    socket_path: "/tmp/bms.sock"
    publish_rate: 1.0
    
    # --- Message Metadata ---
    frame_id: "battery_link"
    location: "base_link"
    design_capacity: 6.0
    
    # --- Diagnostics & Safety Thresholds ---
    over_temp_threshold: 55.0    # Secondary over-temp shutdown threshold (Celsius)
    low_soc_warn_threshold: 0.15 # Low battery warning threshold (15%)
    cell_gap_warn_threshold: 0.1 # Cell voltage gap warning threshold (0.1V)
